name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leakguard
          POSTGRES_PASSWORD: leakguard
          POSTGRES_DB: leakguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leakguard"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://leakguard:leakguard@localhost:5432/leakguard
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-key
          OSINT_TOKEN: ""

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm test
