services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leakguard
      POSTGRES_PASSWORD: leakguard
      POSTGRES_DB: leakguard
    ports:
      - "5433:5432"  # 5433 en host evita conflicto con PostgreSQL local en 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leakguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://leakguard:leakguard@postgres:5432/leakguard
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
      OSINT_TOKEN: ${OSINT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
